---
layout: default
---

<div id="desktop-single">
  <div class="win open foc" style="top:40px;left:40px;width:calc(100vw - 80px);height:calc(100vh - 80px);z-index:100;">
    <div class="wtb" data-win="w-note-single">
      <div class="wtb-t">📝 {{ page.title }}</div>
      <div class="wtb-bs">
        <a href="{{ '/' | relative_url }}" class="wbtn">✕</a>
      </div>
    </div>
    <div class="wmb"><span>File</span><span>View</span></div>
    <div class="wbody">
      <div class="note" style="margin-bottom:20px; background:#f0e5f8; border-color:#b0a0d0;">
        <span class="note-src">{{ page.source | default: page.title }}</span>
        {% if page.tags %}
        <div class="note-tags" style="margin-top:8px;">
          {% for tag in page.tags %}
          <span class="ntag">{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
      </div>

      {{ content }}

      <div class="pixel-hr" style="margin-top:40px;"></div>
      <p style="text-align:center; font-size:14px;">
        <a href="{{ '/' | relative_url }}#w-library">← Back to Library.bk</a>
      </p>
    </div>
    <div class="wsb">
      <span class="sp">{{ page.title }}</span>
      <span class="sp">Library Note</span>
    </div>
  </div>
</div>

<style>
#desktop-single {
  width:100%; height:100vh;
  background-color:#edd5e8;
  background-image:repeating-conic-gradient(#e5cce0 0% 25%, #f2dff0 0% 50%);
  background-size:20px 20px;
  position:relative;
  overflow:hidden;
}
</style>
